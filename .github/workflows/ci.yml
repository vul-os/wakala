name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test, Vet
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go test (short)
        run: go test -short ./...

      - name: go vet
        run: go vet ./...

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gosec
        uses: securego/gosec@v2.22.4
        with:
          args: ./...

      - name: govulncheck
        uses: golang/govulncheck-action@v1.0.4
        with:
          go-version-file: go.mod

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
