<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ephor">
  <title>Ephor</title>
  <desc>Favicon-weight mark: five bold bronze nodes around a thick ring marking the untouched core — the faint orbit line is dropped and shapes enlarged so it stays legible at 16px.</desc>
  <defs>
    <linearGradient id="eph-tile-f" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14171f"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="240" height="240" rx="52" fill="url(#eph-tile-f)"/>
  <!-- thick ring marking the sealed core — solid enough to survive downscale to 16px -->
  <circle cx="120" cy="120" r="34" fill="none" stroke="#C89A56" stroke-width="16"/>
  <!-- five ephors, enlarged and spaced further out so each stays a distinct dot at tiny sizes -->
  <g fill="#C89A56">
    <circle cx="120" cy="42" r="19"/>
    <circle cx="194.2" cy="95.9" r="19"/>
    <circle cx="165.9" cy="183.1" r="19"/>
    <circle cx="74.2" cy="183.1" r="19"/>
    <circle cx="45.8" cy="95.9" r="19"/>
  </g>
</svg>
