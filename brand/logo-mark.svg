<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ephor">
  <title>Ephor</title>
  <desc>Five bronze watch-nodes evenly spaced in a ring around an untouched, hollow core — five ephors overseeing a centre they never enter; the broker sees traffic pass but never its contents.</desc>
  <defs>
    <linearGradient id="eph-tile" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14171f"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
  </defs>
  <!-- near-black tile, matching Vulos OS chrome -->
  <rect x="0" y="0" width="240" height="240" rx="52" fill="url(#eph-tile)"/>
  <!-- the orbit: the path the five watchers walk, drawn faint so the nodes carry the shape -->
  <circle cx="120" cy="120" r="74" fill="none" stroke="#C89A56" stroke-width="3" opacity="0.35"/>
  <!-- the sealed, untouched core: a boundary the ring encloses but never crosses -->
  <circle cx="120" cy="120" r="30" fill="none" stroke="#C89A56" stroke-width="3" opacity="0.55"/>
  <!-- five ephors: evenly spaced, equal size, equal colour — no single node holds the centre -->
  <g fill="#C89A56">
    <circle cx="120" cy="46" r="15"/>
    <circle cx="190.4" cy="97.1" r="15"/>
    <circle cx="163.5" cy="179.9" r="15"/>
    <circle cx="76.5" cy="179.9" r="15"/>
    <circle cx="49.6" cy="97.1" r="15"/>
  </g>
</svg>
