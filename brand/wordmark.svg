<svg width="352" height="96" viewBox="0 0 352 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ephor">
  <title>Ephor</title>
  <desc>Mark tile (five bronze watch-nodes around a hollow core) locked up with the "Ephor" wordmark.</desc>
  <!-- mark tile, scaled into a 72px tile -->
  <svg x="8" y="12" width="72" height="72" viewBox="0 0 240 240">
    <defs>
      <linearGradient id="eph-wm-tile" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#14171f"/>
        <stop offset="1" stop-color="#08090c"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="240" height="240" rx="52" fill="url(#eph-wm-tile)"/>
    <circle cx="120" cy="120" r="74" fill="none" stroke="#C89A56" stroke-width="3" opacity="0.35"/>
    <circle cx="120" cy="120" r="30" fill="none" stroke="#C89A56" stroke-width="3" opacity="0.55"/>
    <g fill="#C89A56">
      <circle cx="120" cy="46" r="15"/>
      <circle cx="190.4" cy="97.1" r="15"/>
      <circle cx="163.5" cy="179.9" r="15"/>
      <circle cx="76.5" cy="179.9" r="15"/>
      <circle cx="49.6" cy="97.1" r="15"/>
    </g>
  </svg>
  <!-- wordmark: no external fonts — system UI stack only. A deeper bronze-ink than the
       mark's bright accent, tuned for legibility on light navbars/headers. -->
  <text x="96" y="61" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1" fill="#8B5A2B">Ephor</text>
</svg>
